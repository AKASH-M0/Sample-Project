<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>
    <meta http-equiv="refresh" content="5">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1e293b;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            color: #22c55e;
        }

        .sidebar a {
            display: block;
            margin: 15px 0;
            color: #94a3b8;
            text-decoration: none;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .header {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 200px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .success { color: #22c55e; }
        .failed { color: #ef4444; }
        .running { color: #facc15; }

        .chart-container {
            margin-top: 40px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>DevOps</h2>
    <a href="#">Dashboard</a>
    <a href="#">Pipelines</a>
    <a href="#">Reports</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

    <div class="header">🚀 CI/CD Monitoring Dashboard</div>

    <div class="cards">
        <div class="card">
            <h3>Status</h3>
            <p class="{{ status|lower }}">{{ status }}</p>
        </div>

        <div class="card">
            <h3>Build Time</h3>
            <p>{{ time }}</p>
        </div>

        <div class="card">
            <h3>Success Rate</h3>
            <p class="success">98%</p>
        </div>
    </div>

    <div class="chart-container">
        <h3>Pipeline Performance</h3>
        <canvas id="pipelineChart"></canvas>
    </div>

    <div class="footer">
        Powered by Jenkins + GitHub CI/CD Pipeline
    </div>

</div>

<script>
const ctx = document.getElementById('pipelineChart').getContext('2d');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Build', 'Test', 'Deploy'],
        datasets: [{
            label: 'Execution Time',
            data: {{ data }},
            tension: 0.4
        }]
    }
});
</script>

</body>
</html>
