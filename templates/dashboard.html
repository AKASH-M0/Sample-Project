<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
        }

        .header {
            padding: 20px;
            font-size: 24px;
            background: #1e293b;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            width: 250px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .success {
            color: #22c55e;
            font-size: 22px;
        }

        .stage {
            margin-top: 10px;
            font-size: 14px;
            color: #94a3b8;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="header">
    🚀 DevOps CI/CD Pipeline Dashboard
</div>

<div class="container">

    <div class="card">
        <h3>Deployment Status</h3>
        <p class="success">✅ {{ status }}</p>
    </div>

    <div class="card">
        <h3>Build Time</h3>
        <p>{{ time }}</p>
    </div>

    <div class="card">
        <h3>Pipeline Stages</h3>
        <p class="stage">✔ Code</p>
        <p class="stage">✔ Build</p>
        <p class="stage">✔ Test</p>
        <p class="stage">✔ Deploy</p>
    </div>

</div>

<div class="footer">
    Automated using CI/CD Pipeline (Jenkins + GitHub)
</div>

</body>
</html>
